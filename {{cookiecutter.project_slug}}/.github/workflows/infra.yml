{% raw %}
name: Infrastructure Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: ["**"]
    tags: ["v*"]

env:
  TG_VERSION: "0.68.9"
  TF_VERSION: "1.15.7"

jobs:
  detect-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.detect.outputs.env }}
    steps:
      - id: detect
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: [detect-env]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive modules/

  validate:
    needs: [detect-env, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt
      - run: cd environments/${{ needs.detect-env.outputs.environment }} && terragrunt run-all validate --terragrunt-non-interactive
        continue-on-error: true

  plan:
    needs: [detect-env, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt
      - run: cd environments/${{ needs.detect-env.outputs.environment }} && terragrunt run-all plan --terragrunt-non-interactive
        continue-on-error: true

  deploy:
    needs: [detect-env, plan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: cd environments/${{ needs.detect-env.outputs.environment }} && terragrunt run-all apply --terragrunt-non-interactive
{% endraw %}
